# Öffentlich: https://kamikimi.esovai.tech (Tunnel → dieser Container :80)
# API/Health laufen im Browser unter derselben Origin (CORS = FRONTEND_ORIGIN).

client_body_temp_path /tmp/nginx_client_temp;
proxy_temp_path       /tmp/nginx_proxy_temp;
fastcgi_temp_path     /tmp/nginx_fastcgi_temp;
uwsgi_temp_path       /tmp/nginx_uwsgi_temp;
scgi_temp_path        /tmp/nginx_scgi_temp;

upstream kimi_backend {
    server kimi-backend:3010;
}

server {
    listen 80;
    server_name kamikimi.esovai.tech;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://kimi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://kimi_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # index.html nie cachen (damit neue Deploys sofort wirken)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # Assets mit Hash im Namen: lang cachen
    location ~* /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
