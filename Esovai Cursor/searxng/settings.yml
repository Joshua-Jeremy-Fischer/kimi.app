use_default_settings:
  engines:
    # Google/Bing: blocken Server-IPs häufig via CAPTCHA
    # Startpage, Qwant, Brave: robuster für Server-Deployments
    keep_only:
      - google
      - bing
      - startpage
      - qwant
      - brave

general:
  instance_name: "KimiSearch"
  debug: false

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "kimi-searxng-secret-42x"
  limiter: false
  public_instance: false

search:
  safe_search: 0
  default_lang: "de-DE"
  formats:
    - html
    - json

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
