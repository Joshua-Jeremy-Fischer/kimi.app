# Kimi-Stack ohne eigenen cloudflared — Tunnel „esovai-mcp“.
# Öffentlich: https://kamikimi.esovai.tech → nur kimi-frontend:80 (Nginx proxy’t /api + /health → kimi-backend:3010).
# Nach docker compose up: nur kimi-frontend ins Netz des MCP-cloudflared hängen, z. B.:
#   docker network connect <NETZNAME> kimi-frontend

services:
  backend:
    build: ./backend
    container_name: kimi-backend
    restart: unless-stopped
    env_file: .env
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=10m,mode=1777
    environment:
      DB_PATH: /data/kimi.db
    volumes:
      - kimi_data:/data
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      args:
        ALLOWED_TOKEN: ${ALLOWED_TOKEN}   # aus .env → in nginx.conf eingebettet
    container_name: kimi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3009:80"
    read_only: true
    cap_drop: [ALL]
    # Port 80 < 1024: ohne NET_BIND_SERVICE startet nginx mit cap_drop ALL nicht zuverlässig
    cap_add: [NET_BIND_SERVICE, CHOWN, SETUID, SETGID]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=10m,mode=1777
      - /var/cache/nginx:size=50m,mode=1777
      - /var/run:size=1m,mode=0755
    networks:
      - app-net


  mobile-frontend:
    build:
      context: ./mobile-frontend
      args:
        ALLOWED_TOKEN: ${ALLOWED_TOKEN}
    container_name: kimi-mobile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3012:80"
    read_only: true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, CHOWN, SETUID, SETGID]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=10m,mode=1777
      - /var/cache/nginx:size=50m,mode=1777
      - /var/run:size=1m,mode=0755
    networks:
      - app-net

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-net

  searxng:
    image: searxng/searxng:latest
    container_name: kimi-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://kimi-searxng:8080
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml
    networks:
      - app-net

  eso-bot:
    build: ./eso-bot
    container_name: eso-bot
    restart: unless-stopped
    env_file: .env
    environment:
      AGENT_PORT: "3020"
      SANDBOX_ROOT: /workspace
      # Defaults (kannst du in .env überschreiben)
      ALLOW_SHELL: "${ALLOW_SHELL:-false}"
      ALLOW_WEB: "${ALLOW_WEB:-true}"
      ALLOW_FILES: "${ALLOW_FILES:-true}"
      ALLOW_GIT: "${ALLOW_GIT:-false}"
    volumes:
      - eso_workspace:/workspace
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=10m,mode=1777
    networks:
      - app-net

  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - openclaw_config:/home/node/.openclaw
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  ollama_data:
  kimi_data:
  eso_workspace:
  openclaw_config:
