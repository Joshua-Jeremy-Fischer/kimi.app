<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#0d0d0d"/>
  <title>Eso Bot</title>
  <link rel="manifest" href="/manifest.json"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --surface2: #1f1f1f;
      --border:   #2a2a2a;
      --accent:   #6366f1;
      --accent-h: #818cf8;
      --text:     #e8e8e8;
      --muted:    #666;
      --user-bg:  #1e1e3a;
      --bot-bg:   #1a1a1a;
      --error:    #f87171;
      --radius:   12px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 15px; }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 1.05rem; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
    .provider-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .provider-wrap label { color: var(--muted); font-size: 0.8rem; }
    select {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.3rem 0.6rem; font-size: 0.85rem; cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 1.25rem 1rem;
      display: flex; flex-direction: column; gap: 1rem;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; gap: 0.75rem; max-width: 100%; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 600; margin-top: 2px;
    }
    .msg.user .avatar  { background: var(--accent); color: #fff; }
    .msg.bot  .avatar  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    .bubble {
      padding: 0.65rem 0.9rem; border-radius: var(--radius);
      line-height: 1.55; max-width: calc(100% - 50px); word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user .bubble { background: var(--user-bg); border-bottom-right-radius: 3px; }
    .msg.bot  .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-bottom-left-radius: 3px; }

    .bubble code {
      background: #111; border: 1px solid var(--border); border-radius: 4px;
      padding: 0.1em 0.35em; font-family: 'Fira Code', monospace; font-size: 0.88em;
    }
    .bubble pre {
      background: #111; border: 1px solid var(--border); border-radius: 8px;
      padding: 0.75rem; overflow-x: auto; margin: 0.5rem 0;
    }
    .bubble pre code { background: none; border: none; padding: 0; }

    .meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.3rem; }
    .msg.user .meta { text-align: right; }

    /* Loading dots */
    .typing { display: flex; gap: 4px; padding: 0.5rem 0.25rem; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* Error banner */
    .error-msg {
      background: #1f0f0f; border: 1px solid #5a1f1f; border-radius: var(--radius);
      padding: 0.65rem 0.9rem; color: var(--error); font-size: 0.9rem;
    }

    /* Empty state */
    #empty {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 0.5rem; color: var(--muted); text-align: center;
      pointer-events: none; padding-bottom: 4rem;
    }
    #empty svg { opacity: 0.15; margin-bottom: 0.5rem; }
    #empty p { font-size: 0.9rem; }

    /* ── Input area ── */
    #input-area {
      padding: 0.75rem 1rem 1rem;
      background: var(--surface); border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #input-row {
      display: flex; gap: 0.5rem; align-items: flex-end;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.5rem 0.5rem 0.5rem 0.9rem;
      transition: border-color 0.15s;
    }
    #input-row:focus-within { border-color: var(--accent); }
    textarea {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: inherit; font-size: 0.95rem;
      resize: none; line-height: 1.5; max-height: 140px; min-height: 24px;
    }
    textarea::placeholder { color: var(--muted); }
    #send-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, opacity 0.15s;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-h); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; fill: #fff; }

    .hint { font-size: 0.72rem; color: var(--muted); text-align: center; margin-top: 0.4rem; }

    /* ── New chat button ── */
    #new-chat {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 0.3rem 0.7rem; font-size: 0.8rem; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #new-chat:hover { border-color: var(--accent); color: var(--text); }

    @media (max-width: 600px) {
      header { flex-wrap: wrap; gap: 0.5rem; }
      .provider-wrap { order: 3; width: 100%; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      Eso Bot
    </div>
    <div class="provider-wrap">
      <label for="provider-sel">Provider</label>
      <select id="provider-sel" title="Provider wählen"></select>
    </div>
    <button id="new-chat" title="Neuen Chat starten">+ Neu</button>
  </header>

  <div id="messages">
    <div id="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Schreib etwas, um zu beginnen.</p>
    </div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="user-input" placeholder="Nachricht …" rows="1" autofocus></textarea>
      <button id="send-btn" disabled title="Senden (Enter)">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <p class="hint">Enter = senden &nbsp;·&nbsp; Shift+Enter = neue Zeile</p>
  </div>
</div>

<script>
(function () {
  'use strict';

  let history = [];
  let loading  = false;

  const $ = id => document.getElementById(id);
  const messagesEl  = $('messages');
  const emptyEl     = $('empty');
  const inputEl     = $('user-input');
  const sendBtn     = $('send-btn');
  const providerSel = $('provider-sel');
  const newChatBtn  = $('new-chat');

  // ── Provider loading ─────────────────────────────────────
  async function loadProviders() {
    try {
      const r = await fetch('/api/providers');
      if (!r.ok) throw new Error(r.status);
      const data = await r.json();
      const providers = data.providers || [];
      providerSel.innerHTML = '';
      providers.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.name + (p.isDefault ? ' ★' : '');
        if (p.isDefault) opt.selected = true;
        providerSel.appendChild(opt);
      });
    } catch {
      providerSel.innerHTML = '<option value="ollama">ollama ★</option>';
    }
  }

  // ── Auto-resize textarea ─────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    sendBtn.disabled = !inputEl.value.trim() || loading;
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) send();
    }
  });

  sendBtn.addEventListener('click', () => send());
  newChatBtn.addEventListener('click', () => clearChat());

  // ── Render helpers ───────────────────────────────────────
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderMarkdown(text) {
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code class="lang-${escapeHtml(lang)}">${escapeHtml(code.trim())}</code></pre>`
    );
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    return text;
  }

  function addMessage(role, content, meta) {
    if (emptyEl) emptyEl.style.display = 'none';
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
    const avatarLabel = role === 'user' ? 'Du' : 'KI';
    const bubble = role === 'user'
      ? `<div class="bubble">${escapeHtml(content)}</div>`
      : `<div class="bubble">${renderMarkdown(content)}</div>`;
    div.innerHTML = `
      <div class="avatar">${avatarLabel}</div>
      <div>
        ${bubble}
        ${meta ? `<div class="meta">${escapeHtml(meta)}</div>` : ''}
      </div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addTyping() {
    if (emptyEl) emptyEl.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="avatar">KI</div>
      <div class="bubble typing">
        <span></span><span></span><span></span>
      </div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = $('typing-indicator');
    if (t) t.remove();
  }

  function addError(msg) {
    const div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = '⚠ ' + msg;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyEl);
    emptyEl.style.display = '';
  }

  // ── Send ─────────────────────────────────────────────────
  async function send() {
    const text = inputEl.value.trim();
    if (!text || loading) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    loading = true;

    history.push({ role: 'user', content: text });
    addMessage('user', text);
    addTyping();

    const selectedProvider = providerSel.value || 'ollama';

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provider: selectedProvider,
          messages: history,
        }),
      });

      removeTyping();

      if (!resp.ok) {
        let errText = `HTTP ${resp.status}`;
        try { const j = await resp.json(); errText = j.error || errText; } catch {}
        addError(errText);
        history.pop();
      } else {
        const data = await resp.json();
        const content = data.content || '(leere Antwort)';
        const metaParts = [];
        if (data.provider) metaParts.push(data.provider);
        if (data.model)    metaParts.push(data.model);
        if (data.usage?.total_tokens) metaParts.push(data.usage.total_tokens + ' Tokens');
        addMessage('assistant', content, metaParts.join(' · '));
        history.push({ role: 'assistant', content });
      }
    } catch (err) {
      removeTyping();
      addError('Netzwerkfehler: ' + err.message);
      history.pop();
    }

    loading = false;
    sendBtn.disabled = !inputEl.value.trim();
    inputEl.focus();
  }

  loadProviders();
})();
</script>
</body>
</html>
