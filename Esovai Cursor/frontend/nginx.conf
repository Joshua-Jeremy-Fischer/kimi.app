# Öffentlich: https://kamikimi.esovai.tech (Tunnel → dieser Container :80)
# API/Health laufen im Browser unter derselben Origin (CORS = FRONTEND_ORIGIN).

upstream kimi_backend {
    server kimi-backend:3010;
}

server {
    listen 80;
    server_name kamikimi.esovai.tech;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://kimi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://kimi_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
