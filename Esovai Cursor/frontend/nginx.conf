# Kimi-Chat nginx — kein Base44, kein shim
# Token wird beim Docker-Build per ARG substituiert (envsubst).

upstream kimi_backend {
    server kimi-backend:3010;
}

server {
    listen 80;
    server_name kamikimi.esovai.tech;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API → Backend (nginx injects auth token, Frontend kennt den Token nicht)
    location /api/ {
        proxy_pass http://kimi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer NGINX_TOKEN_PLACEHOLDER";
    }

    location = /health {
        proxy_pass http://kimi_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # HTML — kein Cache (immer frisch)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Alle anderen statischen Dateien
    location / {
        try_files $uri $uri/ /index.html;
    }
}
