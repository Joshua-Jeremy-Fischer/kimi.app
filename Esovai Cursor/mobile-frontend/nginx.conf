server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # OpenClaw reverse proxy — ^~ verhindert dass /assets-Regex greift
    location ^~ /openclaw/ {
        proxy_pass http://openclaw-gateway:18789/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding "";
    }

    # Backend health passthrough (Backend hat /health ohne /api Prefix)
    location = /health {
        proxy_pass http://kimi-backend:3010/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API to backend
    location /api/ {
        proxy_pass http://kimi-backend:3010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Bearer NGINX_TOKEN_PLACEHOLDER";
    }

    # index.html + sw.js: NIE cachen — immer frisch vom Server
    location ~* ^/(index\.html|sw\.js|manifest\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri /index.html;
    }

    # Hashed Assets (.js, .css): sehr lange cachen (Filename ändert sich bei jedem Build)
    location ~* /assets/.*\.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
