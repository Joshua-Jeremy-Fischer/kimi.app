server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Backend health passthrough (Backend hat /health ohne /api Prefix)
    location = /health {
        set $backend "kimi-backend:3010";
        proxy_pass http://$backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API to backend
    location /api/ {
        set $backend "kimi-backend:3010";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer NGINX_TOKEN_PLACEHOLDER";
        proxy_connect_timeout 90s;
        proxy_send_timeout    900s;
        proxy_read_timeout    900s;
        send_timeout          900s;
        proxy_buffering       off;
    }

    # index.html + sw.js: NIE cachen — immer frisch vom Server
    location ~* ^/(index\.html|sw\.js|manifest\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri /index.html;
    }

    # Hashed Assets (.js, .css): sehr lange cachen (Filename ändert sich bei jedem Build)
    location ~* /assets/.*\.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # OpenClaw intern proxy — umgeht CF Zero Trust (internes Netz)
    location /openclaw/ {
        set $openclaw "openclaw-gateway:18789";
        proxy_pass http://$openclaw/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # X-Frame-Options entfernen damit iframe funktioniert
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header X-Frame-Options "";
        proxy_connect_timeout 30s;
        proxy_read_timeout    120s;
        # Rewrite absolute Redirects auf /openclaw/-Prefix
        proxy_redirect http://$openclaw/ /openclaw/;
        # Sub-Filter: absolute Pfade in HTML auf /openclaw/ umschreiben
        sub_filter_once off;
        sub_filter 'href="/' 'href="/openclaw/';
        sub_filter 'src="/'  'src="/openclaw/';
        sub_filter "href='/" "href='/openclaw/";
        sub_filter "src='/"  "src='/openclaw/";
    }

    # SPA fallback
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
